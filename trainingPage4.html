<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SpySquirrel Mission 4</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>

<style>
:root {
  --sky: #4ec9f0;
  --ground: #5dc642;
  --ground-dark: #3d9e28;
  --yellow: #ffd832;
  --red: #ff4444;
  --panel: rgba(255,255,255,0.95);
}

body {
  margin: 0;
  font-family: 'Nunito', sans-serif;
  background: var(--sky);
}

/* TOP BAR */
.top-bar {
  background: var(--ground);
  border-bottom: 4px solid var(--ground-dark);
  display: flex;
  justify-content: space-between;
  padding: 1rem 2rem;
  color: white;
  font-weight: 800;
}

.logo {
  font-family: 'Fredoka One';
}

/* GAME AREA */
#game {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 80vh;
  gap: 2rem;
}

.title {
  font-size: 1.5rem;
  font-weight: 900;
}

/* BARS */
.bar-container {
  width: 300px;
  height: 25px;
  background: #ddd;
  border-radius: 999px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
}

.player { background: var(--yellow); }
.enemy { background: var(--red); }

/* END SCREEN */
#endScreen {
  position: absolute;
  inset: 0;
  display: none;
  background: rgba(0,0,0,0.5);
  align-items: center;
  justify-content: center;
}

.end-card {
  background: var(--panel);
  padding: 2rem 3rem;
  border-radius: 20px;
  text-align: center;
}

button {
  margin-top: 1rem;
  padding: 0.6rem 1.5rem;
  border-radius: 999px;
  border: none;
  background: var(--yellow);
  font-family: 'Fredoka One';
  cursor: pointer;
}
</style>
</head>

<body>

<div class="top-bar">
  <div class="logo">🐿 Mission 4: Final Showdown</div>
</div>

<div id="game">
  <div class="title">SPAM SPACEBAR TO WIN</div>

  <div>
    <p>🟡 You</p>
    <div class="bar-container">
      <div id="playerBar" class="bar player"></div>
    </div>
  </div>

  <div>
    <p>🔴 Teacher</p>
    <div class="bar-container">
      <div id="enemyBar" class="bar enemy"></div>
    </div>
  </div>
</div>

<div id="endScreen">
  <div class="end-card">
    <h2 id="resultText"></h2>
    <p id="rankText"></p>

    <button onclick="window.location.href='final.html'">
    View Final Results ➜
    </button>
  </div>
</div>

<script>
let playerProgress = 0;
let enemyProgress = 0;

const playerBar = document.getElementById("playerBar");
const enemyBar = document.getElementById("enemyBar");

let gameOver = false;

/* PLAYER SPAM */
document.addEventListener("keydown", (e) => {
  if (e.code === "Space" && !gameOver) {
    playerProgress += 2; // adjust strength here
    updateBars();
  }
});

/* ENEMY AUTO PROGRESS */
setInterval(() => {
  if (gameOver) return;

  enemyProgress += 1 + Math.random() * 1.5;
  updateBars();
}, 100);

/* UPDATE UI */
function updateBars() {
  playerBar.style.width = playerProgress + "%";
  enemyBar.style.width = enemyProgress + "%";

  if (playerProgress >= 100) {
    endGame(true);
  }

  if (enemyProgress >= 100) {
    endGame(false);
  }
}

/* END GAME */
function endGame(win) {
  gameOver = true;

  document.getElementById("endScreen").style.display = "flex";

  let rank;

  if (playerProgress > 120) rank = "Legend 🔥";
  else if (playerProgress > 100) rank = "Elite 🟡";
  else if (playerProgress > 70) rank = "Agent 🔵";
  else rank = "Rookie 🟢";

  document.getElementById("resultText").textContent =
    win ? "YOU BEAT THE TEACHER 💀" : "YOU GOT CAUGHT 😭";

  document.getElementById("rankText").textContent =
    "Final Rank: " + rank;

    localStorage.setItem("mission4Rank", rank);
}
</script>

</body>
</html>
